    <g fill="#FF6B35">
      <rect x="-6" y="-38" width="12" height="15" rx="4"/>
      <rect x="-6" y="23" width="12" height="15" rx="4"/>
      <rect x="-38" y="-6" width="15" height="12" rx="4"/>
      <rect x="23" y="-6" width="15" height="12" rx="4"/>
      <rect x="-6" y="-38" width="12" height="15" rx="4" transform="rotate(45)"/>
      <rect x="-6" y="23" width="12" height="15" rx="4" transform="rotate(45)"/>
      <rect x="-38" y="-6" width="15" height="12" rx="4" transform="rotate(45)"/>
      <rect x="23" y="-6" width="15" height="12" rx="4" transform="rotate(45)"/>
    </g>
    <circle r="27" fill="#FF6B35"/>
    <circle r="12" fill="#1E1028"/>
  </g>
  <!-- data flow -->
  <path d="M 40 178 C 60 178 62 160 78 150" fill="none" stroke="#C4B2D1" stroke-width="6" stroke-linecap="round" stroke-dasharray="1 14"/>
  <path d="M 150 52 C 170 52 184 66 184 88" fill="none" stroke="#C4B2D1" stroke-width="6" stroke-linecap="round" stroke-dasharray="1 14"/>
