<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 224">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2A1838"/>
      <stop offset="1" stop-color="#1E1028"/>
    </linearGradient>
  </defs>
  <rect width="224" height="224" rx="28" fill="url(#bg)"/>
  <!-- big gear (purple) -->
  <g transform="translate(86 92)">
    <g fill="#8B4BA3">
      <rect x="-8" y="-52" width="16" height="20" rx="5"/>
      <rect x="-8" y="32" width="16" height="20" rx="5"/>
      <rect x="-52" y="-8" width="20" height="16" rx="5"/>
      <rect x="32" y="-8" width="20" height="16" rx="5"/>
      <rect x="-8" y="-52" width="16" height="20" rx="5" transform="rotate(45)"/>
      <rect x="-8" y="32" width="16" height="20" rx="5" transform="rotate(45)"/>
      <rect x="-52" y="-8" width="20" height="16" rx="5" transform="rotate(45)"/>
      <rect x="32" y="-8" width="20" height="16" rx="5" transform="rotate(45)"/>
    </g>
    <circle r="38" fill="#8B4BA3"/>
    <circle r="18" fill="#1E1028"/>
