<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 224">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2A1838"/>
      <stop offset="1" stop-color="#1E1028"/>
    </linearGradient>
  </defs>
  <rect width="224" height="224" rx="28" fill="url(#bg)"/>
  <!-- phone -->
  <rect x="58" y="38" width="88" height="148" rx="16" fill="#3A2249" stroke="#8B4BA3" stroke-width="4"/>
  <rect x="74" y="58" width="56" height="10" rx="5" fill="#8B4BA3" opacity="0.55"/>
  <!-- unanswered incoming bubbles -->
  <rect x="72" y="82" width="46" height="16" rx="8" fill="#8B4BA3"/>
  <rect x="72" y="106" width="58" height="16" rx="8" fill="#8B4BA3" opacity="0.75"/>
  <rect x="72" y="130" width="38" height="16" rx="8" fill="#8B4BA3" opacity="0.5"/>
  <!-- typing dots never answered -->
  <circle cx="80" cy="162" r="4" fill="#C4B2D1" opacity="0.5"/>
  <circle cx="94" cy="162" r="4" fill="#C4B2D1" opacity="0.35"/>
  <circle cx="108" cy="162" r="4" fill="#C4B2D1" opacity="0.2"/>
  <!-- notification badge -->
  <circle cx="146" cy="44" r="16" fill="#FF6B35"/>
  <circle cx="146" cy="40" r="3" fill="#1E1028"/>
  <rect x="143" y="46" width="6" height="8" rx="3" fill="#1E1028"/>
  <!-- clock -->
  <circle cx="168" cy="156" r="30" fill="#1E1028" stroke="#FF6B35" stroke-width="6"/>
  <line x1="168" y1="156" x2="168" y2="138" stroke="#FF6B35" stroke-width="6" stroke-linecap="round"/>
  <line x1="168" y1="156" x2="182" y2="164" stroke="#FF6B35" stroke-width="6" stroke-linecap="round"/>
</svg>
